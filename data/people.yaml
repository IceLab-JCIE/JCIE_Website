  -
    id: "wei"
    role: "mentor"
    name:
      en: "Wei Xing"
      zh: "邢炜"
    title:
      en: "Mentor"
      zh: "导师"
    photo: "/people/wei.png"
    bio:
      en: "Wei Xing is a Lecturer in the School of Mathematics and Statistics at the University of Sheffield. He received his PhD from the University of Warwick and was previously an Assistant Professor at Beihang University. His work has been published in Nature portfolio journals and top venues including NeurIPS, DAC, ICCAD, AAAI, and TODAES. In 2025, he was selected as a Top 10 finalist of the UK Manchester Prize. He has supervised multiple SZU undergraduates for direct PhD admissions at Peking University, Beihang University, HKUST, and other universities."
      zh: "英国谢菲尔德大学数学与统计学院讲师，华威大学博士，前北京航空航天大学助理教授。研究成果发表于 Nature 子刊、NeurIPS、DAC、ICCAD、AAAI、TODAES 等顶级会议与期刊，2025 年入选英国 Manchester Prize 十强。已指导多名深大本科生直博北京大学、北京航空航天大学、香港科技大学等高校。"
    pub_ids:
