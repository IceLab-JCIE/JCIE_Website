{{ define "main" }}
  {{ $lang := .Lang }}
  {{ partial "section_heading.html" (dict
    "eyebrow" (cond (eq $lang "zh") "动态" "News")
    "title" .Title
    "description" (.Date.Format "2006-01-02")
  ) }}

  <div style="margin-top:14px;">
    <a class="tiny" href="{{ relLangURL "news/" }}">{{ cond (eq $lang "zh") "← 返回动态" "← Back to News" }}</a>
  </div>

  <article class="card prose" style="margin-top:18px;">
    {{ .Content }}
  </article>
{{ end }}
