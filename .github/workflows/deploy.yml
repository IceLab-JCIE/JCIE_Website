name: Deploy to GitHub Pages

on:
  push:
    branches: ['master', 'staging']
  workflow_dispatch:

env:
  # Opt into Node.js 24 for JavaScript-based actions before the default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Import XLSX (if present)
        run: |
          if [ -f "xlsx/site.xlsx" ]; then
            python -m pip install --upgrade pip
            python -m pip install openpyxl
            python scripts/import_xlsx.py xlsx/site.xlsx --root .
          else
            echo "xlsx/site.xlsx not found; skipping XLSX import."
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

  deploy:
    if: github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
